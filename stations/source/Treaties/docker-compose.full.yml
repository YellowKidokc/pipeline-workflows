# ── Treaties: App + PostgreSQL + Ollama ──
# WARNING: Ollama needs 6GB+ RAM. Only use this on a machine with 16GB+.
# For mini PCs, use docker-compose.yml + external Ollama or API LLM instead.

services:
  postgres:
    image: postgres:16-alpine
    container_name: treaties-db
    environment:
      POSTGRES_USER: treaties
      POSTGRES_PASSWORD: treaties
      POSTGRES_DB: treaties
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treaties -d treaties"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: treaties-ollama
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"
    # For GPU support, uncomment the deploy block below (Linux only)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  app:
    build: .
    container_name: treaties-app
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://treaties:treaties@postgres:5432/treaties
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b-instruct-q4_K_M}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-180}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      SNAPSHOT_DIR: /app/snapshots
    ports:
      - "8000:8000"
    volumes:
      - ./snapshots:/app/snapshots

volumes:
  pgdata:
  ollama:
