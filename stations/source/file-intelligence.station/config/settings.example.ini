[database]
host = 192.168.1.97
port = 5432
name = fis_db
user = fis_user
password = CHANGE_ME

[watcher]
# Comma-separated watch folders
watch_folders =
    O:\_Theophysics_v3,
    C:\Users\lowes\Desktop,
    C:\Users\lowes\OneDrive,
    C:\Users\lowes\Downloads
# Seconds to wait after file creation before processing
debounce_seconds = 3
# File extensions to ignore
ignore_extensions = .tmp,.lock,.swp,.git,.DS_Store

[pipeline]
# Slug max characters
slug_max_chars = 20
# Max subject codes per file
max_subject_codes = 3
# Confidence thresholds
auto_rename_threshold = 85
propose_threshold = 50
# YAKE top N keywords
yake_top_n = 5
yake_language = en
yake_max_ngram = 3

[learning]
# Minimum corrections before learning layer activates
min_corrections = 50
# Model save path
model_path = models/saved/

[whisper]
# Model size: tiny, small, medium, large
model_size = small
# Compute type: int8, float16, float32
compute_type = int8
# Device: cpu, cuda
device = cuda

[obsidian]
vault_name = _Theophysics_v3
vault_path = O:\_Theophysics_v3

[bil]
# Enable behavioral intelligence layer
enabled = true
# Daily export path for AI session digests
export_path = exports/
# Export time (24h format)
export_time = 23:00

[ppk]
# Portable Preference Kernel bridge.
# P05_ppk (was 17_portable_preference_kernel) is the routing/preference spine.
# P01_implicit, P06_river, and P07_markovify are support engines.
enabled = true
package_path = \\dlowenas\brain\Backside\_models\_Models\P05_ppk
model_path = \\dlowenas\brain\Backside\stations\file-intelligence.station\_ppk_runtime\portable_preference_kernel.json
manifest_dir = \\dlowenas\brain\Backside\stations\file-intelligence.station\_ppk_runtime\manifests
top_k = 8

[recon]
# Watch folder for extractor/recon output (.md with frontmatter)
watch_folder =
# Enable recon ingest (routes .md with frontmatter to recon pipeline)
enabled = true

[cold_start]
# Map folder paths to domain.subject codes for cold-start training.
# Format: folder_path = DOMAIN.SUBJECT
# ConfigParser lowercases keys, so use raw paths.
# Uncomment and customize:
# o:\_theophysics_v3\master equation = TP.MQ
# o:\_theophysics_v3\logos papers = TP.LG
# o:\_theophysics_v3\jesus series = TP.JS
# o:\_theophysics_v3\consciousness = TP.CS
# o:\_theophysics_v3\axioms = TP.AX
# c:\users\lowes\documents\trading\setups = DT.ST
# c:\users\lowes\documents\trading\journal = DT.JR
